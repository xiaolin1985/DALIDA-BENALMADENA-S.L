<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DENSEN 盘点专业版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --ios-blue: #007aff; --bg: #f2f2f7; --card: #ffffff; --success: #34c759; --gray: #8e8e93; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; height: 100vh; display: flex; flex-direction: column; }
        
        /* Header */
        .header { background: #fff; padding: 15px; border-bottom: 0.5px solid #ccc; display: flex; justify-content: space-between; align-items: center; padding-top: env(safe-area-inset-top); }
        #status { font-size: 14px; font-weight: bold; color: var(--ios-blue); }

        /* Main Content */
        .main { flex: 1; padding: 15px; overflow-y: auto; }
        .card { background: #fff; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; margin-bottom: 20px; }
        
        /* 记录列表 */
        .log-header { font-size: 13px; color: var(--gray); margin-bottom: 8px; padding-left: 5px; }
        .log-item { 
            display: flex; justify-content: space-between; padding: 15px; 
            background: #fff; border-bottom: 0.5px solid #eee; font-size: 15px; align-items: center;
        }
        .log-item:active { background: #f0f0f0; } /* 点击效果 */
        .log-item:first-child { border-radius: 12px 12px 0 0; }
        .log-item:last-child { border-radius: 0 0 12px 12px; border-bottom: none; }

        /* Buttons */
        .btn { border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-blue { background: var(--ios-blue); color: white; padding: 8px 16px; }
        .btn-confirm { background: var(--success); color: white; width: 100%; height: 55px; font-size: 20px; margin-top: 15px; }
        .btn-cancel { background: #eeeeef; color: #ff3b30; width: 100%; height: 50px; font-size: 16px; margin-top: 10px; }

        /* Modal */
        .modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(8px); }
        .modal { background: #fff; width: 85%; border-radius: 20px; padding: 25px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .modal input { width: 100%; border: 2px solid var(--ios-blue); border-radius: 12px; padding: 15px; font-size: 36px; text-align: center; margin: 20px 0; outline: none; background: #f9f9fb; }
        
        #hiddenScanner { position: absolute; left: -999px; opacity: 0; }
        .item-name { font-weight: bold; font-size: 18px; color: #000; display: block; }
        .item-code { font-size: 12px; color: var(--gray); }
    </style>
</head>
<body onclick="document.getElementById('hiddenScanner').focus()">

<div class="header">
    <div id="status">请导入数据</div>
    <div style="display: flex; gap: 8px;">
        <button class="btn btn-blue" onclick="document.getElementById('fIn').click()">导入</button>
        <button class="btn btn-blue" style="background:#5856d6" onclick="doExport()">导出Excel</button>
    </div>
</div>

<div class="main">
    <input type="file" id="fIn" hidden accept=".xlsx,.xls,.csv" onchange="loadExcel(this)">
    <input type="text" id="hiddenScanner" autofocus autocomplete="off">

    <div id="pCard" class="card" style="display:none;">
        <span id="vName" class="item-name">---</span>
        <span id="vCode" class="item-code">---</span>
        <div style="margin: 15px 0; font-size: 16px;">系统库数: <b id="vStock" style="font-size: 24px; color: var(--ios-blue);">0</b></div>
        <button class="btn btn-confirm" onclick="openModal('NEW')">修改库存</button>
    </div>

    <div class="log-header" id="logTitle" style="display:none;">盘点历史（点击下方数据可快速重改）</div>
    <div id="logList"></div>
</div>

<div class="modal-mask" id="modalMask">
    <div class="modal">
        <h3 id="modalTitle" style="margin:0">输入盘点实数</h3>
        <input type="number" id="inNum" inputmode="numeric">
        <button class="btn btn-confirm" onclick="confirmSave()">确定</button>
        <button class="btn btn-cancel" onclick="closeModal()">取消</button>
    </div>
</div>

<script>
    let db = new Map(); 
    let curP = null; 
    let logs = []; // 格式：{code, name, stock}
    let editIndex = -1; // 记录当前正在修改哪一条历史记录

    // 1. 导入
    async function loadExcel(obj) {
        const file = obj.files[0]; if(!file) return;
        document.getElementById('status').innerText = "读取中...";
        const data = await file.arrayBuffer();
        const wb = XLSX.read(data);
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
        db.clear();
        for(let i=1; i<rows.length; i++){
            const r = rows[i];
            if(r && r[0]) db.set(String(r[0]).trim(), { code: String(r[0]), name: r[1] || "未知商品", stock: parseFloat(r[2])||0 });
        }
        document.getElementById('status').innerText = `✅ 已加载:${db.size}条`;
    }

    // 2. 扫码
    document.getElementById('hiddenScanner').addEventListener('keydown', e => {
        if(e.key === 'Enter'){
            const code = e.target.value.trim(); e.target.value = '';
            const p = db.get(code);
            if(p){
                curP = {...p};
                showCard();
            } else {
                alert("库中无此条码: " + code);
            }
        }
    });

    function showCard() {
        document.getElementById('vName').innerText = curP.name;
        document.getElementById('vCode').innerText = curP.code;
        document.getElementById('vStock').innerText = curP.stock;
        document.getElementById('pCard').style.display = 'block';
    }

    // 3. 弹窗控制
    function openModal(type, index = -1) {
        editIndex = index;
        const input = document.getElementById('inNum');
        const title = document.getElementById('modalTitle');
        
        if(type === 'EDIT') {
            title.innerText = "修正盘点数";
            input.value = logs[index].实数;
        } else {
            title.innerText = "输入盘点实数";
            input.value = curP.stock;
        }
        
        document.getElementById('modalMask').style.display = 'flex';
        setTimeout(() => { input.focus(); input.select(); }, 200);
    }

    // 4. 保存（确定按键逻辑）
    function confirmSave() {
        const val = parseFloat(document.getElementById('inNum').value) || 0;
        
        if (editIndex > -1) {
            // 修改已有记录
            logs[editIndex].实数 = val;
            // 同步更新主卡片显示（如果修改的是当前扫码的商品）
            if(curP && logs[editIndex].条码 === curP.code) {
                document.getElementById('vStock').innerText = val;
            }
        } else {
            // 新增记录
            const newLog = { 
                "条码": curP.code, 
                "商品名称": curP.name, 
                "实数": val,
                "时间": new Date().toLocaleTimeString() 
            };
            logs.unshift(newLog);
            document.getElementById('vStock').innerText = val;
        }
        
        renderLogs();
        closeModal();
    }

    // 5. 渲染列表（点击记录触发重改）
    function renderLogs() {
        const container = document.getElementById('logList');
        document.getElementById('logTitle').style.display = logs.length > 0 ? 'block' : 'none';
        
        container.innerHTML = logs.map((l, index) => `
            <div class="log-item" onclick="openModal('EDIT', ${index})">
                <div style="flex:1">
                    <span style="font-weight:bold">${l.商品名称}</span><br>
                    <span style="font-size:12px; color:#888">${l.条码}</span>
                </div>
                <div style="text-align:right">
                    <span style="font-size:20px; font-weight:bold; color:var(--ios-blue)">${l.实数}</span>
                    <div style="font-size:10px; color:#ccc">${l.时间}</div>
                </div>
            </div>
        `).join('');
    }

    function closeModal() {
        document.getElementById('modalMask').style.display = 'none';
        document.getElementById('hiddenScanner').focus();
        editIndex = -1;
    }

    // 6. 导出
    function doExport() {
        if(logs.length === 0) return alert("没有盘点记录");
        const ws = XLSX.utils.json_to_sheet(logs);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "盘点结果");
        XLSX.writeFile(wb, `盘点结果_${new Date().toLocaleDateString()}.xlsx`);
    }
</script>
</body>
</html>
