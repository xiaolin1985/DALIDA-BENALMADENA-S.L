<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DENSEN 盘点助手</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --ios-blue: #007aff; --bg: #f2f2f7; --card: #ffffff; --success: #34c759; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #fff; padding: 15px; border-bottom: 0.5px solid #ccc; display: flex; justify-content: space-between; align-items: center; padding-top: env(safe-area-inset-top); }
        .main { flex: 1; padding: 15px; overflow-y: auto; }
        .card { background: #fff; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; margin-bottom: 15px; }
        .log-item { display: flex; justify-content: space-between; padding: 12px; background: #fff; border-bottom: 0.5px solid #eee; font-size: 14px; }
        .btn { border: none; border-radius: 10px; padding: 10px 18px; font-weight: bold; }
        .btn-blue { background: var(--ios-blue); color: white; }
        .btn-green { background: var(--success); color: white; width: 100%; height: 55px; font-size: 18px; margin-top: 15px; }
        .modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(5px); }
        .modal { background: #fff; width: 85%; border-radius: 20px; padding: 20px; text-align: center; }
        .modal input { width: 100%; border: 2px solid var(--ios-blue); border-radius: 10px; padding: 12px; font-size: 32px; text-align: center; margin: 15px 0; outline: none; }
        #hiddenScanner { position: absolute; left: -999px; opacity: 0; }
    </style>
</head>
<body onclick="document.getElementById('hiddenScanner').focus()">

<div class="header">
    <div id="status" style="font-size:14px; font-weight:bold; color:var(--ios-blue);">等待导入...</div>
    <div style="display: flex; gap: 8px;">
        <button class="btn btn-blue" onclick="document.getElementById('fIn').click()">导入</button>
        <button class="btn btn-blue" style="background:#5856d6" onclick="doExport()">导出Excel</button>
    </div>
</div>

<div class="main">
    <input type="file" id="fIn" hidden accept=".xlsx,.xls,.csv" onchange="loadExcel(this)">
    <input type="text" id="hiddenScanner" autofocus autocomplete="off">

    <div id="pCard" class="card" style="display:none;">
        <div style="font-size:20px; font-weight:bold;" id="vName">---</div>
        <div style="color:#888; margin:10px 0;" id="vCode">---</div>
        <div style="font-size:18px;">系统库存: <b id="vStock">0</b></div>
        <button class="btn btn-green" onclick="openModal()">修改库存</button>
    </div>

    <div id="logList"></div>
</div>

<div class="modal-mask" id="modalMask">
    <div class="modal">
        <h3 style="margin:0">输入数量</h3>
        <input type="number" id="inNum" inputmode="numeric">
        <div style="display:flex; gap:10px;">
            <button class="btn btn-blue" style="flex:1;height:50px" onclick="save('ADD')">➕ 新增</button>
            <button class="btn btn-green" style="flex:1;height:50px" onclick="save('TOTAL')">🎯 总数</button>
        </div>
        <button class="btn" style="width:100%;margin-top:15px;color:gray;" onclick="closeModal()">取消</button>
    </div>
</div>

<script>
    let db = new Map(); let curP = null; let logs = [];
    async function loadExcel(obj) {
        const file = obj.files[0]; if(!file) return;
        document.getElementById('status').innerText = "读取中...";
        const data = await file.arrayBuffer();
        const wb = XLSX.read(data);
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
        db.clear();
        for(let i=1; i<rows.length; i++){
            const r = rows[i];
            if(r && r[0]) db.set(String(r[0]).trim(), { code: String(r[0]), name: r[1], stock: parseFloat(r[2])||0 });
        }
        document.getElementById('status').innerText = `✅ 已加载:${db.size}条`;
    }
    document.getElementById('hiddenScanner').addEventListener('keydown', e => {
        if(e.key==='Enter'){
            const code = e.target.value.trim(); e.target.value = '';
            const p = db.get(code);
            if(p){
                curP = {...p};
                document.getElementById('vName').innerText = p.name;
                document.getElementById('vCode').innerText = p.code;
                document.getElementById('vStock').innerText = p.stock;
                document.getElementById('pCard').style.display = 'block';
            }
        }
    });
    function openModal(){
        document.getElementById('modalMask').style.display='flex';
        const i = document.getElementById('inNum'); i.value = curP.stock;
        setTimeout(()=>{ i.focus(); i.select(); }, 200);
    }
    function save(mode){
        const val = parseFloat(document.getElementById('inNum').value)||0;
        let diff = (mode==='ADD') ? val : (val - curP.stock);
        let final = (mode==='ADD') ? (curP.stock + val) : val;
        const log = { "条码": curP.code, "商品": curP.name, "变动": diff, "最终库存": final };
        logs.unshift(log);
        db.get(curP.code).stock = final;
        document.getElementById('vStock').innerText = final;
        renderLogs(); closeModal();
    }
    function renderLogs(){
        document.getElementById('logList').innerHTML = logs.slice(0,10).map(l => `
            <div class="log-item">
                <span>${l.商品}</span>
                <span>变动:<b>${l.变动}</b> 最终:<b>${l.最终库存}</b></span>
            </div>
        `).join('');
    }
    function closeModal(){ document.getElementById('modalMask').style.display='none'; document.getElementById('hiddenScanner').focus(); }
    function doExport(){
        if(logs.length===0) return alert("无记录");
        const ws = XLSX.utils.json_to_sheet(logs);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "结果");
        XLSX.writeFile(wb, `盘点_${new Date().getTime()}.xlsx`);
    }
</script>
</body>
</html>
