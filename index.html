<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventory Pro | 护眼模式</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --ios-bg: #E9ECEF;
            --ios-card: #F8F9FA;
            --ios-blue: #4A6D8C;
            --ios-green: #6B8E6B;
            --ios-red: #D68C8C;
            --ios-text: #2D3436;
            --ios-secondary: #7F8C8D;
            --ios-input-bg: #DDE1E4;
            --shadow: 0 4px 12px rgba(0,0,0,0.03);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--ios-bg);
            margin: 0; padding: 20px;
            color: var(--ios-text);
            display: flex; justify-content: center;
        }

        .app-container { width: 100%; max-width: 960px; display: flex; flex-direction: column; gap: 20px; }

        .header-bar { display: flex; justify-content: space-between; align-items: center; }
        .header-bar h1 { font-size: 22px; margin: 0; }

        .btn {
            border: none; border-radius: 12px; font-size: 14px; font-weight: 600;
            padding: 10px 18px; cursor: pointer; transition: 0.2s;
            background: var(--ios-input-bg); color: var(--ios-text);
        }
        .btn-blue { background: var(--ios-blue); color: #FFF; }
        .btn-green { background: var(--ios-green); color: #FFF; }

        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .dash-card { background: var(--ios-card); padding: 15px; border-radius: 18px; box-shadow: var(--shadow); text-align: center; }
        .dash-label { font-size: 10px; color: var(--ios-secondary); margin-bottom: 5px; }
        .dash-value { font-size: 22px; font-weight: 700; color: var(--ios-blue); }

        .main-action { background: var(--ios-card); padding: 20px; border-radius: 20px; box-shadow: var(--shadow); }
        #scanInput {
            width: 100%; height: 50px; background: var(--ios-input-bg); border: 2px solid transparent;
            border-radius: 12px; font-size: 18px; text-align: center; outline: none; transition: 0.3s;
        }
        #scanInput:focus { background: #FFF; border-color: var(--ios-blue); }

        .list-card { background: var(--ios-card); border-radius: 20px; box-shadow: var(--shadow); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { padding: 15px; text-align: left; font-size: 11px; color: var(--ios-secondary); background: rgba(0,0,0,0.02); }
        td { padding: 15px; font-size: 14px; border-bottom: 1px solid rgba(0,0,0,0.03); }

        /* 修复后的弹窗 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal {
            background: #FFF; width: 90%; max-width: 350px; border-radius: 28px;
            padding: 30px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
        .price-hero { font-size: 36px; font-weight: 800; color: var(--ios-blue); margin: 15px 0; }
        
        /* 核心修复：数字键盘输入框 */
        #qtyInput { 
            width: 140px; height: 60px; border-radius: 16px; border: 2.5px solid var(--ios-blue);
            font-size: 32px; text-align: center; margin-bottom: 20px; background: #F8F9FA;
            /* 强制调出数字键盘 */
            -webkit-appearance: none;
        }

        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-bar">
        <h1>盘点系统 <span>Pro</span></h1>
        <div style="display: flex; gap: 8px;">
            <label for="fileInput" class="btn">导入</label>
            <input type="file" id="fileInput" accept=".xlsx, .xls" />
            <button class="btn btn-green" onclick="exportMismatch()">报告</button>
        </div>
    </div>

    <div class="main-action">
        <input type="text" id="scanInput" placeholder="点击激活扫码枪..." disabled />
    </div>

    <div class="dashboard">
        <div class="dash-card"><div class="dash-label">SKU</div><div class="dash-value" id="stat-total">0</div></div>
        <div class="dash-card"><div class="dash-label">已盘</div><div class="dash-value" id="stat-done">0</div></div>
        <div class="dash-card"><div class="dash-label">异常</div><div class="dash-value" style="color:var(--ios-red)" id="stat-err">0</div></div>
    </div>

    <div class="list-card">
        <table>
            <thead><tr><th>商品详情</th><th style="text-align:center">应有</th><th style="text-align:center">实盘</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="3" style="text-align:center; padding:40px;">等待导入数据...</td></tr></tbody>
        </table>
    </div>
</div>

<div class="modal-overlay" id="qtyModal">
    <div class="modal">
        <h3 id="mName" style="margin:0">商品名</h3>
        <div class="price-hero" id="mPrice">¥0.00</div>
        <div style="margin-bottom:15px; color:var(--ios-secondary)">目前已盘: <span id="mCurr" style="color:var(--ios-blue); font-weight:bold;">0</span></div>
        
        <input type="number" id="qtyInput" inputmode="decimal" placeholder="1" />
        
        <div style="font-size: 12px; color: var(--ios-secondary); margin-bottom: 20px;">回车默认+1 | 输入 -1 冲减</div>
        <div style="display: flex; gap: 10px;">
            <button class="btn" style="flex:1" onclick="closeModal()">取消</button>
            <button class="btn btn-blue" style="flex:1.5" onclick="confirmQty()">确认录入</button>
        </div>
    </div>
</div>

<script>
    let inventoryData = [];
    let currentIdx = -1;

    // 导入逻辑
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            inventoryData = json.map(i => ({
                barcode: String(i['条码'] || '').trim(),
                name: String(i['商品名'] || '未名商品'),
                expected: parseInt(i['应有数量'] || 0),
                price: parseFloat(i['售价'] || 0).toFixed(2),
                actual: 0, scanned: false
            }));
            render();
            updateStats();
            document.getElementById('scanInput').disabled = false;
            document.getElementById('scanInput').focus();
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    function render() {
        const tb = document.getElementById('tableBody');
        tb.innerHTML = '';
        inventoryData.forEach(i => {
            const row = `<tr>
                <td><div style="font-weight:600">${i.name}</div><div style="font-size:11px;color:#999">${i.barcode}</div></td>
                <td style="text-align:center">${i.expected}</td>
                <td style="text-align:center; font-weight:bold; color:${i.scanned?'#4A6D8C':'#CCC'}">${i.scanned?i.actual:'-'}</td>
            </tr>`;
            tb.insertAdjacentHTML('beforeend', row);
        });
    }

    // 扫码逻辑
    document.getElementById('scanInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') {
            const idx = inventoryData.findIndex(i => i.barcode === e.target.value.trim());
            if (idx !== -1) {
                currentIdx = idx;
                const i = inventoryData[idx];
                document.getElementById('mName').innerText = i.name;
                document.getElementById('mPrice').innerText = '¥' + i.price;
                document.getElementById('mCurr').innerText = i.actual;
                document.getElementById('qtyModal').style.display = 'flex';
                document.getElementById('qtyInput').value = '';
                // 延迟聚焦确保键盘弹出
                setTimeout(() => document.getElementById('qtyInput').focus(), 100);
            } else { alert("找不到条码: " + e.target.value); }
            e.target.value = '';
        }
    });

    function confirmQty() {
        const val = document.getElementById('qtyInput').value === '' ? 1 : parseInt(document.getElementById('qtyInput').value);
        inventoryData[currentIdx].actual += val;
        inventoryData[currentIdx].scanned = true;
        render();
        updateStats();
        closeModal();
    }

    function updateStats() {
        document.getElementById('stat-total').innerText = inventoryData.length;
        document.getElementById('stat-done').innerText = inventoryData.filter(i => i.scanned).length;
        document.getElementById('stat-err').innerText = inventoryData.filter(i => i.scanned && i.actual !== i.expected).length;
    }

    function closeModal() { document.getElementById('qtyModal').style.display = 'none'; document.getElementById('scanInput').focus(); }

    function exportMismatch() {
        const list = inventoryData.filter(i => i.scanned && i.actual !== i.expected);
        if(!list.length) return alert("没有差异");
        const ws = XLSX.utils.json_to_sheet(list.map(i => ({ "条码": i.barcode, "商品名": i.name, "应有": i.expected, "实盘": i.actual, "差异": i.actual - i.expected })));
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "差异报告");
        XLSX.writeFile(wb, "盘点差异报告.xlsx");
    }

    // 快捷键支持
    document.getElementById('qtyInput').addEventListener('keydown', e => { 
        if(e.key==='Enter') confirmQty(); 
        if(e.key==='Escape') closeModal(); 
    });
</script>

</body>
</html>
