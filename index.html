<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DALIDA 退货管理 - 数字键盘版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --ios-blue: #007AFF; --radius: 12px; }
        body { background: #F2F2F7; font-family: -apple-system, sans-serif; margin: 0; padding: 15px; }
        .container { background: #FFF; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { padding: 15px; border-bottom: 1px solid #EEE; display: flex; justify-content: space-between; align-items: center; }
        .action-area { padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .card { background: #F9F9F9; padding: 12px; border-radius: var(--radius); }
        .ios-input { width: 100%; box-sizing: border-box; border: 1px solid #DDD; border-radius: 8px; padding: 12px; font-size: 16px; outline: none; }
        .ios-btn { background: var(--ios-blue); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; width: 100%; }
        
        /* 数量输入模态框 */
        #qtyModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center;
        }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 80%; max-width: 300px; text-align: center; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #F5F5F7; padding: 10px; font-size: 12px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #EEE; font-size: 14px; }
        .col-qty { font-weight: 800; color: var(--ios-blue); text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <strong id="totalQtyDisplay">退货总数: 0</strong>
        <span id="displayDate"></span>
    </div>

    <div class="action-area">
        <div class="card">
            <button class="ios-btn" style="background:#000; margin-bottom:10px" onclick="document.getElementById('fileInput').click()">加载数据库</button>
            <input type="file" id="fileInput" accept=".xlsx, .xls, .csv" style="display:none">
            <input type="text" id="scanInput" class="ios-input" placeholder="点击此处开始扫码..." style="border: 2px solid var(--ios-blue); height: 50px; text-align: center;">
        </div>

        <div class="card">
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 5px;">
                <input type="text" id="m_name" class="ios-input" placeholder="商品名称">
                <input type="text" id="m_qty" inputmode="decimal" class="ios-input" placeholder="数量">
            </div>
            <button class="ios-btn" style="background:#34C759; margin-top:8px" onclick="manualAdd()">添加商品</button>
        </div>
    </div>

    <div style="padding: 15px;">
        <table id="mainTable">
            <thead><tr><th>条码</th><th>名称</th><th style="text-align:center">数量</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div id="qtyModal">
    <div class="modal-content">
        <h3 id="modalProdName" style="margin-top:0">商品名称</h3>
        <p style="color:#666; font-size:14px">请输入退货数量</p>
        <input type="text" id="modalQtyInput" inputmode="decimal" class="ios-input" style="font-size:24px; text-align:center; margin-bottom:15px;" value="1">
        <div style="display: flex; gap: 10px;">
            <button class="ios-btn" style="background:#CCC" onclick="closeModal()">取消</button>
            <button class="ios-btn" onclick="confirmQty()">确认</button>
        </div>
    </div>
</div>

<script>
    let db = {};
    let currentScanData = null;

    // 加载数据库
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (evt) => {
            const data = new Uint8Array(evt.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            db = {};
            rows.forEach(row => {
                let code = String(row['条码'] || "").trim();
                if (code) db[code] = row['商品'] || "未知商品";
            });
            alert("数据库已就绪！");
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    // 扫码监听
    document.getElementById('scanInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            let barcode = this.value.trim();
            let name = db[barcode] || "新商品(未匹配)";
            currentScanData = { barcode, name };
            
            // 弹出自定义数字键盘框
            document.getElementById('modalProdName').innerText = name;
            document.getElementById('qtyModal').style.display = 'flex';
            document.getElementById('modalQtyInput').value = "1";
            document.getElementById('modalQtyInput').select(); // 自动全选方便修改
            document.getElementById('modalQtyInput').focus();
            this.value = '';
        }
    });

    function confirmQty() {
        let qty = document.getElementById('modalQtyInput').value;
        if (qty && !isNaN(qty)) {
            addRow(currentScanData.barcode, currentScanData.name, qty);
            closeModal();
        }
    }

    function closeModal() {
        document.getElementById('qtyModal').style.display = 'none';
        document.getElementById('scanInput').focus();
    }

    function addRow(code, name, qty) {
        const tbody = document.querySelector('#mainTable tbody');
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${code}</td><td>${name}</td><td class="col-qty">${qty}</td>`;
        tbody.prepend(tr);
        updateTotal();
    }

    function manualAdd() {
        const name = document.getElementById('m_name').value;
        const qty = document.getElementById('m_qty').value;
        if(name && qty) {
            addRow("手动", name, qty);
            document.getElementById('m_name').value = '';
            document.getElementById('m_qty').value = '';
        }
    }

    function updateTotal() {
        let total = 0;
        document.querySelectorAll('.col-qty').forEach(td => total += parseFloat(td.innerText) || 0);
        document.getElementById('totalQtyDisplay').innerText = "退货总数: " + total;
    }

    document.getElementById('displayDate').innerText = new Date().toLocaleDateString();
</script>
</body>
</html>
